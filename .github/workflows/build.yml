name: Build W5500 EVB Pico2
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: sudo apt-get install -y gcc-arm-none-eabi cmake python3

      - name: Create W5500_EVB_PICO2 board
        run: |
          cp -r ports/rp2/boards/W5500_EVB_PICO ports/rp2/boards/W5500_EVB_PICO2
          echo "=== mpconfigboard.cmake ===" 
          cat ports/rp2/boards/W5500_EVB_PICO2/mpconfigboard.cmake
          echo "=== mpconfigboard.h ==="
          cat ports/rp2/boards/W5500_EVB_PICO2/mpconfigboard.h
          echo "=== RPI_PICO2 cmake ==="
          cat ports/rp2/boards/RPI_PICO2/mpconfigboard.cmake
          echo "=== RPI_PICO2 h ==="
          cat ports/rp2/boards/RPI_PICO2/mpconfigboard.h

      - name: Build mpy-cross
        run: make -C mpy-cross

      - name: Build firmware
        run: |
          cd ports/rp2
          make BOARD=W5500_EVB_PICO2 submodules
          make BOARD=W5500_EVB_PICO2

      - name: Upload firmware 
        uses: actions/upload-artifact@v4
        with:
          name: firmware-w5500-evb-pico2
          path: ports/rp2/build-W5500_EVB_PICO2/firmware.uf2
